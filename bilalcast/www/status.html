<!DOCTYPE html>
<html>
<head>
<meta charset=UTF-8>
<meta name=viewport content='width=device-width,initial-scale=1'>
<meta http-equiv=refresh content=60>
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=default>
<meta name=apple-mobile-web-app-title content="Bilal Cast">
<link rel=apple-touch-icon href=/icon.png>
<title>Bilal Cast</title>
<style>
body{font-family:sans-serif;margin:0;padding:16px;background:#f4f6f9;color:#222}
.hd{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px}
h1{margin:0;font-size:1.3rem;color:#1a73e8}
.rb{background:none;border:none;cursor:pointer;padding:4px;color:#1a73e8;font-size:1.3rem;line-height:1}
.rb.spinning{animation:sp .7s linear infinite}
.c{background:#fff;border-radius:8px;padding:14px;margin:8px 0;box-shadow:0 1px 3px rgba(0,0,0,.12)}
table{width:100%;border-collapse:collapse}
td{padding:6px 4px;border-bottom:1px solid #eee;font-size:.95rem}
.nx td{background:#e8f0fe;font-weight:700}
.ps td{opacity:.4}
.ok{color:#188038}.fl{color:#d93025}
button{padding:8px 14px;border:none;border-radius:4px;cursor:pointer;margin:4px 2px;font-size:.9rem}
.bt{background:#1a73e8;color:#fff}.br{background:#d93025;color:#fff}.bg{background:#5f6368;color:#fff}
#ptr{height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:height .2s;color:#888;font-size:.85rem}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #ccc;border-top-color:#1a73e8;border-radius:50%;animation:sp .7s linear infinite;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id=ab style="display:none;background:#1a73e8;color:#fff;padding:10px 14px;margin:-16px -16px 12px;font-size:.85rem;line-height:1.4">
<b>Add to Home Screen</b> for quick access &mdash; tap the Share button &#10514; then &ldquo;Add to Home Screen&rdquo;
<button onclick="this.parentNode.style.display='none'" style="float:right;background:none;border:none;color:#fff;font-size:1rem;cursor:pointer;padding:0 0 0 8px">&times;</button>
</div>
<div id=ptr></div>
<div class=hd>
<h1>Bilal Cast</h1>
<span style="display:flex;align-items:center;gap:4px">{{rssi_svg + ""}}<button class=rb onclick="this.classList.add('spinning');location.reload()" title=Refresh>&#8635;</button></span>
</div>
<div class=c>{{local_time}}</div>
<div class=c>Cast Device: {{device_name}} {{cast_status + ""}}<br>
Last Call Made: {{lc + ""}}</div>
<div class=c><table>{{rows + ""}}</table></div>
<div class=c>
<a href=/settings><button type=button class=bg>Settings</button></a>
<button class=br onclick="if(confirm('Reset all settings?'))fetch('/factory-reset',{method:'POST'}).then(()=>alert('Resetting...'))">Factory Reset</button>
<p style='margin:8px 0 0;font-size:.8rem;color:#888'>http://{{hostname}}.local &middot; {{local_ip}}</p>
</div>
<script>
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!navigator.standalone){document.getElementById('ab').style.display='block'}
// Pull-to-refresh
var ptr=document.getElementById('ptr'),sy=0,pulling=false;
document.addEventListener('touchstart',function(e){if(window.scrollY===0)sy=e.touches[0].clientY;},{ passive:true});
document.addEventListener('touchmove',function(e){
  if(window.scrollY>0||!sy)return;
  var dy=e.touches[0].clientY-sy;
  if(dy>0){
    pulling=true;
    var h=Math.min(dy*0.4,56);
    ptr.style.height=h+'px';
    ptr.innerHTML=dy>80?'<span class=spin></span>Release to refresh':'<span style="margin-right:6px">↓</span>Pull to refresh';
  }
},{ passive:true});
document.addEventListener('touchend',function(){
  if(pulling&&parseInt(ptr.style.height||0)>=32){
    ptr.innerHTML='<span class=spin></span>Refreshing…';
    ptr.style.height='40px';
    setTimeout(function(){location.reload();},200);
  }else{
    ptr.style.height='0';
  }
  sy=0;pulling=false;
});
</script>
</body>
</html>
